name: CI

on:
  push:
    branches: ["main", "copilot/**", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Install, Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (lint)
        run: npm run lint

      - name: Build
        run: npm run build
